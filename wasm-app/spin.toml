spin_manifest_version = 2

[application]
name    = "wasm-app"
version = "0.1.0"

[[trigger.http]]
route     = "/..."
component = "wasm-app"

[component.wasm-app]
source = "wasm_app.wasm"
# Mount model artifacts into the WASI sandbox filesystem root
files = [
    { source = "model_artifacts/model.onnx",  destination = "model.onnx"  },
    { source = "model_artifacts/scaler.json", destination = "scaler.json" },
    { source = "model_artifacts/classes.json", destination = "classes.json" },
]

[component.wasm-app.build]
command = "cargo build --target wasm32-wasip1 --release"