version: "3.8"

services:

  # ── Inference Lanes ────────────────────────────────────────────
  python-lane:
    image: secure-python:latest
    ports: ["8500:8000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  rust-lane:
    image: secure-rust:latest
    environment:
      - RUST_BACKTRACE=1
    ports: ["8501:8000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL",
             "echo -e 'GET /health HTTP/1.0\\r\\n' | nc localhost 8000 | grep -q ok"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  wasm-lane:
    image: secure-wasm:latest
    ports: ["8502:8000"]
    restart: unless-stopped
    # distroless has no shell/nc; poll from outside via Ansible health-wait task
    healthcheck:
      test: ["CMD", "/usr/local/bin/spin", "--version"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Monitoring Stack ───────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports: ["8090:8080"]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped