---
# =============================================================================
# SPE Research Infrastructure & Benchmark Pipeline
# Covers: SBOM, CVE scanning, syscall surface, cold-start, multi-load k6,
#         memory footprint, accuracy, and a single consolidated summary report.
# =============================================================================
- name: SPE Research Benchmark Pipeline
  hosts: localhost
  connection: local
  become: yes

  vars:
    workspace:      "/var/lib/jenkins/workspace/SPE-RE"
    lanes:
      - name: python
        port: 8500
      - name: rust
        port: 8501
      - name: wasm
        port: 8502
    k6_vus:         [10, 50, 100]        # three load levels for degradation curve
    k6_duration:    "3s"
    bench_runs:     1                    # repeat each k6 scenario → mean ± std
    test_payload:   '{"features":[0.0, 126.0, 86.0, 27.0, 120.0, 27.399999618530273, 0.5149999856948853, 21.0, 3452.39990234375, 0.0, 3288.0]}'
    batch_payload_file: "test_samples.json"

  # ---------------------------------------------------------------------------
  # SECTION 0 — Bootstrap / idempotency guards
  # ---------------------------------------------------------------------------
  tasks:

    - name: "0a. Verify sudo and apt"
      shell: |
        whoami
        apt-get update 2>&1 | tail -3
      register: debug_out
      changed_when: false
      ignore_errors: yes

    - name: "0b. Show bootstrap output"
      debug:
        var: debug_out.stdout_lines

    - name: "0c. Restore apt sources if missing"
      copy:
        dest: /etc/apt/sources.list
        content: |
          deb http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
        force: no          # only writes if the file is absent / empty

    - name: "0d. Fix Jenkins repo GPG key (idempotent)"
      shell: |
        wget -O /usr/share/keyrings/jenkins-keyring.asc \
          https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
        if [ -f /etc/apt/sources.list.d/jenkins.list ]; then
          sed -i 's|deb https://pkg.jenkins.io/debian-stable|deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable|' \
            /etc/apt/sources.list.d/jenkins.list
        fi
      args:
        creates: /usr/share/keyrings/jenkins-keyring.asc

  # ---------------------------------------------------------------------------
  # SECTION 1 — Tool installation
  # ---------------------------------------------------------------------------

    - name: "Install system prerequisites"
      apt:
        name:
          - jq
          - apt-transport-https
          - ca-certificates
          - gnupg
          - docker.io
          - docker-compose
          - curl
          - git
          - wget
          - strace           # syscall profiling
          - netcat-openbsd   # health polling (nc)
          - bc               # floating-point arithmetic in shell
        state: present
        update_cache: yes
      register: apt_result
      retries: 3
      delay: 5
      until: apt_result is succeeded

    - name: "Install k6"
      shell: |
        gpg --no-default-keyring \
          --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
          --keyserver hkp://keyserver.ubuntu.com:80 \
          --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
          | tee /etc/apt/sources.list.d/k6.list
        apt-get update && apt-get install -y k6
      args:
        creates: /usr/bin/k6

    - name: "Install Syft (SBOM)"
      shell: >
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh
        | sh -s -- -b /usr/local/bin
      args:
        creates: /usr/local/bin/syft

    - name: "Install Scaphandre (Energy Monitoring)"
      shell: |
        # Download the v1.0.0 release which uses this naming convention
        curl -sSfL https://github.com/hubblo-org/scaphandre/releases/download/v1.0.0/scaphandre-v1.0.0-x86_64-unknown-linux-musl -o /usr/local/bin/scaphandre
        
        # Fallback if v1.0.0 path changes
        if [ ! -s /usr/local/bin/scaphandre ]; then
          curl -sSfL https://github.com/hubblo-org/scaphandre/releases/latest/download/scaphandre -o /usr/local/bin/scaphandre
        fi

        chmod +x /usr/local/bin/scaphandre
      args:
        creates: /usr/local/bin/scaphandre
      register: scap_install
      retries: 2
      delay: 5

    - name: "Install Trivy (CVE scanner)"
      shell: |
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
          | gpg --dearmor | tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
          | tee /etc/apt/sources.list.d/trivy.list
        apt-get update && apt-get install -y trivy
      args:
        creates: /usr/bin/trivy

  # ---------------------------------------------------------------------------
  # SECTION 2 — Build & start containers
  # ---------------------------------------------------------------------------

    - name: "Build Docker images"
      shell: |
        docker build -t secure-{{ item.name }}:latest \
          -f {{ item.name }}-app/Dockerfile \
          .
      args:
        chdir: "{{ workspace }}"
      loop: "{{ lanes }}"
      loop_control:
        label: "Building secure-{{ item.name }}"
      become: no
      register: build_result
 
    - name: "Confirm all images exist"
      shell: docker image inspect secure-{{ item.name }}:latest --format '{{ "{{" }}.Id{{ "}}" }}'
      loop: "{{ lanes }}"
      become: no
      register: image_check
      failed_when: image_check.rc != 0

    - name: "Stop and remove all containers from previous builds (if any)"
      shell: docker compose down
      args:
        chdir: "{{ workspace }}"
      become: no

    - name: "Build and start all lanes"
      shell: docker-compose up --build -d
      args:
        chdir: "{{ workspace }}"
      become: no

    - name: "Wait for all lanes to be healthy (up to 60 s)"
      shell: |
        for i in $(seq 1 12); do
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:{{ item.port }}/health)
          [ "$status" = "200" ] && exit 0
          sleep 5
        done
        exit 1
      loop: "{{ lanes }}"
      become: no
      register: health_wait
      failed_when: health_wait.rc != 0

  # ---------------------------------------------------------------------------
  # SECTION 3 — Security audit
  # ---------------------------------------------------------------------------

    - name: "Generate SBOMs with Syft (CycloneDX JSON)"
      shell: >
        syft secure-{{ item.name }}:latest -o cyclonedx-json
        > {{ workspace }}/sbom-{{ item.name }}.json
      loop: "{{ lanes }}"
      become: no

    - name: "Extract SBOM component counts"
      shell: |
        count=$(jq '.components | length' {{ workspace }}/sbom-{{ item.name }}.json)
        echo "{{ item.name }}: $count components" \
          >> {{ workspace }}/sbom-summary.txt
      loop: "{{ lanes }}"
      become: no

    - name: "Trivy CVE scan — full JSON + severity summary"
      shell: |
        trivy image --format json -o {{ workspace }}/trivy-{{ item.name }}.json \
          secure-{{ item.name }}:latest
        jq '{
          image: "secure-{{ item.name }}",
          summary: (
            [.Results[]?.Vulnerabilities[]?.Severity // empty]
            | reduce .[] as $s ({}; .[$s] += 1)
          ),
          total_cves: ([.Results[]?.Vulnerabilities[]? // empty] | length)
        }' {{ workspace }}/trivy-{{ item.name }}.json \
          > {{ workspace }}/trivy-summary-{{ item.name }}.json
      loop: "{{ lanes }}"
      become: no
      ignore_errors: yes

  # ---------------------------------------------------------------------------
  # SECTION 4 — Syscall surface profiling (novel security metric)
  # ---------------------------------------------------------------------------

    - name: "Profile syscall surface with strace (single inference)"
      shell: |
        strace -c -f \
          curl -s -X POST http://localhost:{{ item.port }}/predict \
               -H "Content-Type: application/json" \
               -d '{{ test_payload }}' \
          2> {{ workspace }}/strace-raw-{{ item.name }}.txt
        # Count distinct syscall names (lines with a % sign are the summary table)
        distinct=$(grep -E '^\s+[0-9]+\.[0-9]+' {{ workspace }}/strace-raw-{{ item.name }}.txt \
                   | awk '{print $NF}' | sort -u | wc -l)
        echo "{{ item.name }}: $distinct distinct syscalls" \
          >> {{ workspace }}/syscall-summary.txt
        cp {{ workspace }}/strace-raw-{{ item.name }}.txt \
           {{ workspace }}/strace-{{ item.name }}.txt
      loop: "{{ lanes }}"
      become: no
      ignore_errors: yes    # WASM distroless may limit strace attach

  # ---------------------------------------------------------------------------
  # SECTION 5 — Memory footprint
  # ---------------------------------------------------------------------------

    - name: "Capture memory footprint (RSS) via docker stats"
      shell:
        cmd: |
          # 1. Warm-up inference
          # We use a shell variable to avoid quote nesting issues
          PAYLOAD='{{ test_payload | to_json }}'
          curl -s -X POST http://localhost:{{ item.port }}/predict \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" > /dev/null

          # 2. Collect Stats (Median of 3)
          readings=()
          for i in {1..3}; do
            # Using raw tags for BOTH the Go template AND the Bash array length later
            mb=$(docker stats --no-stream --format "{% raw %}{{.MemUsage}}{% endraw %}" \
                  $(docker ps --filter "publish={{ item.port }}" -q) \
                | awk -F'/' '{print $1}' \
                | sed 's/[^0-9.]//g')
            
            if [ -n "$mb" ]; then
                readings+=("$mb")
            fi
            sleep 2
          done

          # 3. Output median
          # FIX: Wrap the array length check in raw tags to prevent "Missing end of comment" error
          {% raw %}
          if [ ${#readings[@]} -gt 0 ]; then
            median=$(printf '%s\n' "${readings[@]}" | sort -n | sed -n '2p' || printf '%s\n' "${readings[@]}" | head -n 1)
            {% endraw %}
            echo "{{ item.name }}: ${median} MiB RSS (warm)" >> {{ workspace }}/memory-summary.txt
          {% raw %}
          else
            {% endraw %}
            echo "{{ item.name }}: Error collecting stats" >> {{ workspace }}/memory-summary.txt
          {% raw %}
          fi
          {% endraw %}
        executable: /bin/bash
      loop: "{{ lanes }}"
      become: no

    - name: "Energy Profiling (Asynchronous Snapshot & Sum)"
      shell: |
        {% if item.name == lanes[0].name %}
        > {{ workspace }}/sustainability-summary.txt
        {% endif %}

        # 1. Start Scaphandre in background (JSON Stream Mode)
        # We use a 320s timeout to safely cover the 300s k6 run
        docker run --rm --privileged \
          -v /sys/class/powercap:/sys/class/powercap -v /proc:/proc -v /var/run/docker.sock:/var/run/docker.sock \
          hubblo/scaphandre:latest \
          json -t 320 --containers --max-top-consumers 20 > {{ workspace }}/energy_raw_{{ item.name }}.json &
        
        # Capture the background PID of the docker command
        MONITOR_PID=$!
        
        # 2. Warm-up (Ensure Scaphandre has started sampling)
        sleep 5

        # 3. Sustained Load (The "Meat" of the benchmark)
        # We pass the port dynamically via the loop item
        k6 run -e PORT={{ item.port }} --vus 50 --duration 300s {{ workspace }}/stress-test.js > /dev/null

        # 4. Stop the monitor immediately after k6 finishes
        kill $MONITOR_PID || true
        docker ps -q --filter ancestor=hubblo/scaphandre | xargs -r docker stop > /dev/null 2>&1

        # 5. Numerical Integration (Summarizing the Snapshots)
        # We strip the text header, slurp the stream, and sum the microwatts
        raw_sum=$(sed -n '/\[{/,$p' {{ workspace }}/energy_raw_{{ item.name }}.json | \
                  jq -s 'map(.[] | .consumers[] | select(.container.name | contains("{{ item.name }}")) | .consumption) | .[]' | \
                  awk '{sum += $1} END {printf "%.10f", sum}')
        
        # 6. Final Calculation: (Sum / 1,000,000) * 2s sampling step = Total Joules
        total_j=$(echo "scale=6; ($raw_sum / 1000000) * 2" | bc)
        
        echo "{{ item.name }}: ${total_j} Joules" >> {{ workspace }}/sustainability-summary.txt
      loop: "{{ lanes }}"
      loop_control:
        label: "Profiling Energy for {{ item.name }}"
      become: no

  # ---------------------------------------------------------------------------
  # SECTION 6 — Cold-start latency
  # ---------------------------------------------------------------------------

    - name: "Measure cold-start latency (stop → start → first request)"
      shell: |
        {% if item.name == lanes[0].name %}
        > {{ workspace }}/coldstart-summary.txt
        {% endif %}

        container=$(docker ps --filter "publish={{ item.port }}" -q)
        docker stop "$container" > /dev/null

        start_ns=$(date +%s%N)
        docker start "$container" > /dev/null

        # Poll until healthy
        for i in $(seq 1 30); do
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:{{ item.port }}/health 2>/dev/null)
          [ "$status" = "200" ] && break
          sleep 1
        done

        end_ns=$(date +%s%N)
        cold_ms=$(( (end_ns - start_ns) / 1000000 ))
        echo "{{ item.name }}: ${cold_ms} ms" \
          >> {{ workspace }}/coldstart-summary.txt
      loop: "{{ lanes }}"
      become: no

  # ---------------------------------------------------------------------------
  # SECTION 7 — k6 performance benchmarking (multi-load, repeated runs)
  #             Produces mean ± std for p99 latency at each VU level
  # ---------------------------------------------------------------------------

    - name: "k6 stress test — {{ item[0].name }} @ {{ item[1] }} VUs (run {{ item[2] }})"
      shell: |
        k6 run \
          -e PORT={{ item[0].port }} \
          -e VUS={{ item[1] }} \
          --vus {{ item[1] }} \
          --duration {{ k6_duration }} \
          --summary-export {{ workspace }}/k6-{{ item[0].name }}-vu{{ item[1] }}-run{{ item[2] }}.json \
          {{ workspace }}/stress-test.js
      args:
        chdir: "{{ workspace }}"
      loop: "{{ lanes | product(k6_vus, range(1, bench_runs + 1)) | list }}"
      loop_control:
        label: "{{ item[0].name }}-vu{{ item[1] }}-run{{ item[2] }}"
      become: no
      ignore_errors: yes

    - name: "Aggregate k6 results — mean ± std per lane per VU level"
      shell:
        cmd: |
          lane="{{ item[0].name }}"
          vus="{{ item[1] }}"
          
          cd {{ workspace }}
          files=(k6-${lane}-vu${vus}-run*.json)

          if [ ! -e "${files[0]}" ]; then
            echo "${lane},${vus},0,0,0,0" >> k6-aggregated.csv
            exit 0
          fi

          # The Fixed JQ logic that handles both nested and flat k6 formats
          p95_values=$(jq -rs '[.[] | .metrics.http_req_duration | if .values then .values["p(95)"] else .["p(95)"] end] | map(select(. != null))' "${files[@]}")

          count=$(echo "$p95_values" | jq 'length')
          
          if [ "$count" -gt 0 ]; then
            mean=$(echo "$p95_values" | jq 'add / length')
            std=$(echo "$p95_values" | jq "if length > 1 then (map(. - $mean) | map(. * .) | add / length | sqrt) else 0 end")
            min=$(echo "$p95_values" | jq 'min')
            max=$(echo "$p95_values" | jq 'max')
            echo "${lane},${vus},${mean},${std},${min},${max}" >> k6-aggregated.csv
          else
            echo "${lane},${vus},0,0,0,0" >> k6-aggregated.csv
          fi
        executable: /bin/bash
      loop: "{{ lanes | product(k6_vus) | list }}"
      loop_control:
        label: "{{ item[0].name }}-vu{{ item[1] }}"
      become: no

  # ---------------------------------------------------------------------------
  # SECTION 8 — Accuracy (batch inference over test set)
  # ---------------------------------------------------------------------------

    - name: "Batch accuracy check"
      shell: |
        {% if item.name == lanes[0].name %}
        > {{ workspace }}/accuracy-summary.txt
        {% endif %}
        result=$(curl -s -X POST http://localhost:{{ item.port }}/batch \
          -H "Content-Type: application/json" \
          --data-binary @model_artifacts/{{ batch_payload_file }})
        acc=$(echo "$result" | jq -r '.accuracy // .acc // "N/A"')
        echo "{{ item.name }}: accuracy=${acc}" >> {{ workspace }}/accuracy-summary.txt
      loop: "{{ lanes }}"
      args:
        chdir: "{{ workspace }}"
      loop_control:
        label: "{{ item.name }}"

  # ---------------------------------------------------------------------------
  # SECTION 9 — Docker image size
  # ---------------------------------------------------------------------------

    - name: "Record Docker image sizes"
      shell: |
        {% if item.name == lanes[0].name %}
        > {{ workspace }}/imagesize-summary.txt
        {% endif %}
        size=$(docker image inspect secure-{{ item.name }}:latest --format '{% raw %}{{.Size}}{% endraw %}')
        size_mb=$(echo "scale=2; $size/1048576" | bc)
        echo "{{ item.name }}: ${size_mb} MB" >> {{ workspace }}/imagesize-summary.txt
      loop: "{{ lanes }}"
      loop_control:
        label: "{{ item.name }}"

  # ---------------------------------------------------------------------------
  # SECTION 10 — Consolidated summary report
  # ---------------------------------------------------------------------------

    - name: "Generate consolidated research summary (summary.json)"
      shell: |
        cd {{ workspace }}

        python3 - <<'PYEOF'
        import json, csv, os, re

        ws = "{{ workspace }}"

        def read_kv(path):
            """Parse 'lane: value' text files into a dict, stripping units."""
            out = {}
            try:
                if not os.path.exists(path): return {}
                for line in open(path):
                    line = line.strip()
                    if ': ' in line:
                        k, v = line.split(': ', 1)
                        # Extracts the first numeric value found (handles "1.23 J", "45 MiB", etc.)
                        num = re.findall(r"[-+]?\d*\.\d+|\d+", v)
                        out[k.strip()] = num[0] if num else v.strip()
            except Exception:
                pass
            return out

        def read_trivy(lane):
            path = f"{ws}/trivy-summary-{lane}.json"
            try:
                return json.load(open(path))
            except:
                return {}

        def read_k6_csv(path):
            rows = []
            try:
                with open(path) as f:
                    reader = csv.DictReader(f, fieldnames=["lane","vus","mean_p99","std_p99","min_p99","max_p99"])
                    for r in reader: rows.append(r)
            except:
                pass
            return rows

        def read_sbom_count(lane):
            path = f"{ws}/sbom-{lane}.json"
            try:
                with open(path) as f:
                    return len(json.load(f).get("components", []))
            except:
                return 0

        lanes = ["python", "rust", "wasm"]
        
        # Load Metrics
        sbom_counts    = {l: read_sbom_count(l) for l in lanes}
        coldstart      = read_kv(f"{ws}/coldstart-summary.txt")
        memory         = read_kv(f"{ws}/memory-summary.txt")
        syscalls       = read_kv(f"{ws}/syscall-summary.txt")
        accuracy       = read_kv(f"{ws}/accuracy-summary.txt")
        imagesizes     = read_kv(f"{ws}/imagesize-summary.txt")
        sustainability = read_kv(f"{ws}/sustainability-summary.txt")
        k6_rows        = read_k6_csv(f"{ws}/k6-aggregated.csv")

        # Structure k6 results
        k6_by_lane = {l: {} for l in lanes}
        for r in k6_rows:
            lane, vus = r["lane"], r["vus"]
            if lane in k6_by_lane:
                k6_by_lane[lane][f"vu{vus}"] = {
                    "mean_p99": r["mean_p99"], "std_p99": r["std_p99"]
                }

        summary = {
            "meta": {
                "project": "SPE Research Infrastructure",
                "duration": "300s",
                "model": "Pima Diabetes Stacking/ONNX"
            },
            "lanes": {}
        }

        for l in lanes:
            t = read_trivy(l)
            summary["lanes"][l] = {
                "security": {
                    "sbom_count": sbom_counts.get(l),
                    "cves": t.get("total_cves", 0),
                    "severities": t.get("summary", {}),
                    "syscalls": syscalls.get(l)
                },
                "performance": {
                    "cold_start_ms": coldstart.get(l),
                    "memory_mib": memory.get(l),
                    "image_mb": imagesizes.get(l),
                    "energy_j": sustainability.get(l),
                    "k6": k6_by_lane.get(l)
                },
                "accuracy": accuracy.get(l)
            }

        # ── GENERATE MARKDOWN ────────────────────────────────────────────────
        md = ["# SPE Benchmark Summary\n"]
        
        # Table 1: Security
        md += ["## Security Profile\n", "| Lane | SBOM | CVEs | Syscalls |", "|---|---|---|---|"]
        for l in lanes:
            sec = summary["lanes"][l]["security"]
            md.append(f"| {l} | {sec['sbom_count']} | {sec['cves']} | {sec['syscalls']} |")

        # Table 2: Performance
        md += ["\n## Latency & Resources\n", "| Lane | Cold Start (ms) | Mem (MiB) | p99 @ 100VU |", "|---|---|---|---|"]
        for l in lanes:
            perf = summary["lanes"][l]["performance"]
            p99 = perf["k6"].get("vu100", {}).get("mean_p99", "?")
            md.append(f"| {l} | {perf['cold_start_ms']} | {perf['memory_mib']} | {p99} |")

        # Table 3: Sustainability (The 300s Metric)
        md += ["\n## Sustainability & Efficiency Index\n", "| Lane | Avg Power (W) | Total Energy (J) | Accuracy |", "|---|---|---|---|"]
        for l in lanes:
            try:
                joules = float(summary["lanes"][l]["performance"]["energy_j"] or 0)
                avg_w = round(joules / 300, 6)
                acc = summary["lanes"][l]["accuracy"]
                md.append(f"| {l} | {avg_w} | {joules} | {acc} |")
            except:
                md.append(f"| {l} | Error | Error | ? |")

        with open(f"{ws}/summary.json", "w") as f: json.dump(summary, f, indent=2)
        with open(f"{ws}/summary.md", "w") as f: f.write("\n".join(md))
        PYEOF
      args:
        chdir: "{{ workspace }}"
      become: no

    - name: "Print summary to Ansible output"
      shell: "cat {{ workspace }}/summary.md"
      register: summary_out
      become: no
      changed_when: false

    - name: "Show summary"
      debug:
        var: summary_out.stdout_lines

  # ---------------------------------------------------------------------------
  # SECTION 11 — Teardown
  # ---------------------------------------------------------------------------

    - name: "Stop and remove all containers"
      shell: docker-compose down
      args:
        chdir: "{{ workspace }}"
      become: no