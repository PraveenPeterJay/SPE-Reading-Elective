---
- name: SPE Research Infrastructure & Benchmark Pipeline
  hosts: localhost
  connection: local
  become: yes
  vars:
    k6_version: "0.49.0"
    trivy_version: "0.49.1"

  tasks:
    - name: 0. Debug - Check sudo and apt
      shell: |
        whoami
        apt-get update 2>&1 || echo "APT FAILED: $?"
        cat /etc/apt/sources.list | head -5
      register: debug_out
      ignore_errors: yes

    - name: 0b. Show debug output
      debug:
        var: debug_out.stdout_lines

    - name: 0c. Fix apt sources if empty
      shell: |
        if [ ! -s /etc/apt/sources.list ]; then
          echo "deb http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse" > /etc/apt/sources.list
          echo "deb http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse" >> /etc/apt/sources.list
        fi
      become: yes

    - name: 0d. Fix Jenkins repo GPG key
      shell: |
        wget -O /usr/share/keyrings/jenkins-keyring.asc \
          https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
        sed -i 's|deb https://pkg.jenkins.io/debian-stable|deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable|' \
          /etc/apt/sources.list.d/jenkins.list
      args:
        creates: /usr/share/keyrings/jenkins-keyring.asc
      become: yes

    - name: 1. Ensure Prerequisites (Docker & Dependencies)
      apt:
        name:
          - jq
          - apt-transport-https
          - ca-certificates
          - gnupg
          - docker.io
          - docker-compose
          - curl
          - git
          - wget
        state: present
        update_cache: yes
      register: apt_result
      retries: 3
      delay: 5
      until: apt_result is succeeded

    - name: 2. Install k6 (Performance Testing)
      shell: |
        gpg --no-default-keyring \
          --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
          --keyserver hkp://keyserver.ubuntu.com:80 \
          --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
          | tee /etc/apt/sources.list.d/k6.list
        apt-get update && apt-get install -y k6
      args:
        creates: /usr/bin/k6

    - name: 3. Install Syft (SBOM Generation)
      shell: "curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin"
      args:
        creates: /usr/local/bin/syft

    - name: 4. Install Trivy (Vulnerability Scanning)
      shell: |
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
          | gpg --dearmor \
          | tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
          | tee /etc/apt/sources.list.d/trivy.list
        apt-get update && apt-get install -y trivy
      args:
        creates: /usr/bin/trivy

    - name: 5. Build and Start All Lanes
      shell: "docker-compose up --build -d"
      args:
        chdir: /var/lib/jenkins/workspace/SPE-RE
      become: no

    - name: 6. Compliance Audit - Generate SBOMs (Syft)
      shell: "syft secure-{{ item }}:latest -o json > sbom-{{ item }}.json"
      args:
        chdir: /var/lib/jenkins/workspace/SPE-RE
      loop: ['python', 'rust', 'wasm']
      become: no

    - name: 7. Security Audit - Trivy Image Scans with Summary
      shell: |
        trivy image --format json -o trivy-{{ item }}.json secure-{{ item }}:latest
        jq '. + {Summary: ([.Results[]?.Vulnerabilities[]?.Severity // empty] | reduce .[] as $sev ({}; .[$sev] += 1))}' trivy-{{ item }}.json > tmp-{{ item }}.json
        mv tmp-{{ item }}.json trivy-{{ item }}.json
      args:
        chdir: /var/lib/jenkins/workspace/SPE-RE
      loop: ['python', 'rust', 'wasm']
      become: no
      ignore_errors: yes
      # ignore_errors: yes

    # - name: 8. Performance Stress Test - k6
    #   shell: "k6 run -e PORT={{ item.port }} stress-test.js --summary-export=perf-{{ item.name }}.json"
    #   args:
    #     chdir: /var/lib/jenkins/workspace/SPE-RE
    #   loop:
    #     - { name: 'python', port: 8500 }
    #     - { name: 'rust',   port: 8501 }
    #     - { name: 'wasm',   port: 8502 }
    #   become: no

    - name: 9. Stop and Clean Up All Lanes
      shell: "docker-compose down"
      args:
        chdir: /var/lib/jenkins/workspace/SPE-RE
      become: no