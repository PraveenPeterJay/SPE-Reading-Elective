---
- name: Setup Core System Dependencies
  hosts: localhost
  become: true
  vars:
    keyrings_path: "/usr/share/keyrings"

  tasks:
    - name: 0.1 Pre-flight - Force clear APT locks
      shell: |
        rm -f /var/lib/dpkg/lock-frontend
        rm -f /var/lib/apt/lists/lock
        dpkg --configure -a
      changed_when: false

    - name: 0.2 Remove restricted Snap versions
      community.general.snap:
        name: [k6, docker]
        state: absent

    - name: 0.3 Install system prerequisites
      apt:
        name: [apt-transport-https, ca-certificates, curl, gnupg, lsb-release, python3-pip]
        state: present
        update_cache: yes

    - name: 0.4 Add GPG keys (Docker, k6, Trivy)
      shell: |
        curl -fsSL {{ item.url }} | gpg --dearmor --yes -o {{ keyrings_path }}/{{ item.name }}.gpg
      loop:
        - { url: "https://download.docker.com/linux/ubuntu/gpg", name: "docker-archive-keyring" }
        - { url: "https://dl.k6.io/key.gpg", name: "k6-archive-keyring" }
        - { url: "https://aquasecurity.github.io/trivy-repo/deb/public.key", name: "trivy-archive-keyring" }
      args:
        creates: "{{ keyrings_path }}/{{ item.name }}.gpg"

    - name: 0.5 Add Repositories
      apt_repository:
        repo: "{{ item }}"
        state: present
      loop:
        - "deb [arch=amd64 signed-by={{ keyrings_path }}/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        - "deb [signed-by={{ keyrings_path }}/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main"
        - "deb [signed-by={{ keyrings_path }}/trivy-archive-keyring.gpg] https://aquasecurity.github.io/trivy-repo/deb {{ ansible_distribution_release }} main"

    - name: 0.6 Install All Native Binaries
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin, k6, trivy]
        state: present
        update_cache: yes

    - name: 0.7 Configure Docker Service and Permissions
      block:
        - name: Ensure Docker is started
          service:
            name: docker
            state: started
            enabled: yes
        - name: Add Jenkins to docker group
          user:
            name: "jenkins"
            groups: docker
            append: yes
        - name: Fix Docker socket permissions for current session
          file:
            path: /var/run/docker.sock
            mode: '0666'

- name: SPE Research Automated Benchmark Pipeline
  hosts: localhost
  tasks:
    - name: 1. Build and Start All Lanes
      shell: "docker compose up --build -d"

    - name: 2. Wait for Services to Warm Up
      pause:
        seconds: 10

    - name: 3. Security Audit - Trivy Image Scans
      shell: "trivy image --severity HIGH,CRITICAL --format json -o trivy-{{ item }}.json secure-{{ item }}:latest"
      loop: ['python', 'rust', 'wasm']
      ignore_errors: yes

    - name: 4. Performance Stress Test - k6 Loops
      shell: "k6 run -e PORT={{ item.port }} stress-test.js --summary-export=perf-{{ item.name }}.json"
      loop:
        - { name: 'python', port: 8500 }
        - { name: 'rust',   port: 8501 }
        - { name: 'wasm',   port: 8502 }

    - name: 5. Shutdown Environment
      shell: "docker compose down"